services:
  mysql:
    image: mysql:8.0
    container_name: articulos-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: articulos_db
      MYSQL_USER: articulos_user
      MYSQL_PASSWORD: articulos_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: articulos-api
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: articulos_user
      DB_PASSWORD: articulos_pass
      DB_NAME: articulos_db
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./migrations:/app/migrations

volumes:
  mysql_data:
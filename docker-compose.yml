services:
  mysql:
    image: mysql:8.0
    container_name: articulos-mysql
    environment:
      MYSQL_DATABASE: articulos_db
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: articulos_user
      MYSQL_PASSWORD: articulos_pass
    ports:
      - 3306:3306
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck: 
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data: